{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <div class="mb-3">
                    <div class="rounded-circle bg-dark text-white d-inline-flex align-items-center justify-content-center"
                         style="width:80px; height:80px; font-size:2rem;">
                        {{ session['username'][0].upper() }}
                    </div>
                </div>
                <h4 class="fw-bold">{{ session['username'] }}</h4>
                <p class="text-muted">Your expense summary</p>
                <hr>
                <div class="row text-center mt-3">
                    <div class="col">
                        <p class="text-muted mb-1">Total Spent</p>
                        <h5 class="fw-bold">₹{{ "%.2f"|format(total) }}</h5>
                    </div>
                    <div class="col">
                        <p class="text-muted mb-1">Total Entries</p>
                        <h5 class="fw-bold">{{ count }}</h5>
                    </div>
                    <div class="col">
                        <p class="text-muted mb-1">Top Category</p>
                        <h5 class="fw-bold">{{ top_category }}</h5>
                    </div>
                </div>
                <div class="mt-4">
                    <a href="/dashboard" class="btn btn-dark w-100">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
